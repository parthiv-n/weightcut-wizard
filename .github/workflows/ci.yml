name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on the same branch — a fresh push supersedes the old
# one. Keeps the runners free for actual work.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # `--ignore-scripts` skips the `postinstall` sed-patch on the
        # apple-sign-in plugin (iOS-only, irrelevant in CI) so the install
        # stays reproducible across runners.
        run: npm ci --ignore-scripts

      - name: Type-check
        # Currently has a non-zero baseline; promote to a hard fail once
        # the existing errors are cleared. Tracked in the repo audit.
        run: npx tsc --noEmit -p tsconfig.app.json
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Test
        run: npm test

      - name: Build (production)
        # Sanity-check that the Vite build still produces a bundle.
        # Sentry source-map upload is skipped here (no auth token), which
        # is the intended behaviour per `vite.config.ts`.
        run: npm run build
